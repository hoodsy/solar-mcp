[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "anyio>=4.14.2",
    "ruff>=0.15.22",
    "mypy>=2.3.0",
    # core's BulkStore imports duckdb lazily; runtime dep is declared by the
    # packages that use it, but core's own tests need it present
    "duckdb>=1.1",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]
mypy_path = [
    "packages/core/src",
    "packages/nrel-solar/src",
    "packages/solar-economics/src",
    "packages/solar-market/src",
    "packages/solar-forecast/src",
    "packages/solar-data-mcp/src",
    "packages/core/tests",
    "packages/nrel-solar/tests",
    "packages/solar-economics/tests",
    "packages/solar-market/tests",
    "packages/solar-forecast/tests",
    "packages/solar-data-mcp/tests",
]
files = [
    "packages/core/src",
    "packages/nrel-solar/src",
    "packages/solar-economics/src",
    "packages/solar-market/src",
    "packages/solar-forecast/src",
    "packages/solar-data-mcp/src",
    "packages/core/tests",
    "packages/nrel-solar/tests",
    "packages/solar-economics/tests",
    "packages/solar-market/tests",
    "packages/solar-forecast/tests",
    "packages/solar-data-mcp/tests",
    "conftest.py",
    "examples",
]
explicit_package_bases = true

[[tool.mypy.overrides]]
module = ["duckdb", "quartz_solar_forecast.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = [
    "packages/core/tests",
    "packages/nrel-solar/tests",
    "packages/solar-economics/tests",
    "packages/solar-market/tests",
    "packages/solar-forecast/tests",
    "packages/solar-data-mcp/tests",
]

# Coverage is a CI gate (pytest --cov=<each package>, see ci.yml), not welded
# onto every local run — `pytest -k one_test` stays usable.
[tool.coverage.report]
fail_under = 85
show_missing = true
